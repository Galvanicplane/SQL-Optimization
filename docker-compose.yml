version: '3.8'

services:
  peformance-db:
    image: postgres:15
    container_name: proj_perf_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: perf_db
    ports:
      - "5432:5432"
    # pg_stat_statements 
    command: postgres -c shared_preload_libraries=pg_stat_statements -c pg_stat_statements.track=all
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./data:/data
      - ./scripts:/scripts
    restart: unless-stopped

volumes:
  pgdata:

